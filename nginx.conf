server {
  listen 80;
  server_name _; 
  
  root /usr/share/nginx/html;
  index index.html;
  
  # API Proxy para backend Docker do WhatsApp
  location /api/whatsapp {
    proxy_pass http://host.docker.internal:3000; # Use 'host.docker.internal' to hit the host machine's port 3000 where the user's API is.
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }
  
  # Configuração para History API do React (SPA)
  location / {
    try_files $uri $uri/ /index.html;
  }
}
